name: publish-cli

# Publishes the terminal client to npm — and, if a Homebrew tap is
# configured, bumps its formula — whenever a `cli-v*` tag is pushed.
#
#   git tag cli-v1.0.0 && git push origin cli-v1.0.0
#
# Publishing uses npm Trusted Publishing (OIDC) — no NPM_TOKEN needed.
# One-time setup, required before this workflow can publish:
#   1. Publish the first version manually (`npm publish`) to claim the name —
#      npm can't configure a trusted publisher for a package that doesn't exist.
#   2. On https://www.npmjs.com/package/ridefollow-cli/access add a trusted
#      publisher: GitHub Actions, repo RideFollow/ridefollow-cli, workflow
#      `publish-cli.yml`. The package.json `repository` URL must match the repo.
# Optional (enables the Homebrew tap bump):
#   HOMEBREW_TAP_TOKEN   PAT with write access to the tap repo
#   HOMEBREW_TAP_REPO    repo variable, default ridefollow/homebrew-tap

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.0)"
        required: true

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22 # Trusted Publishing needs Node >= 22.14.0
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        # Trusted Publishing needs npm >= 11.5.1; Node 22 still ships npm 10.x.
        # Pinned to 11.x on purpose: npm 12.0.0 ships a broken bundle (the
        # `sigstore` package is missing from libnpmpublish's reachable
        # node_modules), so `npm publish` fails with MODULE_NOT_FOUND — even
        # more so with --provenance. Drop the pin once a fixed 12.0.x is out.
        run: npm install -g npm@11

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${GITHUB_REF_NAME#cli-v}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Publishing ridefollow-cli@$VER"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Set package version
        run: npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        # OIDC: npm mints a short-lived credential — no token env. --provenance
        # attaches a build attestation (and is needed for the publish to succeed).
        run: npm publish --provenance --access public

  update-homebrew:
    needs: publish-npm
    runs-on: ubuntu-latest
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO || 'ridefollow/homebrew-tap' }}
    steps:
      - name: Should we bump the tap?
        id: guard
        run: |
          if [ -n "$TAP_TOKEN" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "::notice::HOMEBREW_TAP_TOKEN not set — skipping Homebrew tap bump (npm publish still ran)."
          fi

      - name: Checkout source (for the seed formula)
        if: steps.guard.outputs.go == 'true'
        uses: actions/checkout@v5

      - name: Checkout tap
        if: steps.guard.outputs.go == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ env.TAP_TOKEN }}
          path: tap

      - name: Update formula
        if: steps.guard.outputs.go == 'true'
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${GITHUB_REF_NAME#cli-v}"
          fi
          URL="https://registry.npmjs.org/ridefollow-cli/-/ridefollow-cli-${VER}.tgz"
          # npm can lag a few seconds behind publish — retry until the tarball is live.
          for i in $(seq 1 30); do
            if curl -fsL "$URL" -o pkg.tgz; then break; fi
            echo "waiting for $URL ($i)…"; sleep 5
          done
          SHA=$(sha256sum pkg.tgz | awk '{print $1}')
          echo "version=$VER sha256=$SHA"
          mkdir -p tap/Formula
          # Rewrite url/sha256 in the seed formula and drop it into the tap.
          sed -E \
            -e "s#^  url \".*\"#  url \"${URL}\"#" \
            -e "s#^  sha256 \".*\"#  sha256 \"${SHA}\"#" \
            Formula/ridefollow-cli.rb > tap/Formula/ridefollow-cli.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Formula already up to date."
          else
            git add Formula/ridefollow-cli.rb
            git commit -m "ridefollow-cli ${VER}"
            git push
          fi
